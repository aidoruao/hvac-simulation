\* TLC configuration for HelmholtzEOS model checking
\*
\* Usage: java -cp tla2tools.jar tlc2.TLC -config helmholtz.cfg helmholtz.tla

SPECIFICATION Spec

\* Model values for constants
CONSTANTS
    FLUIDS = {"R410A", "R32", "R134a", "R1234yf", "R22"}
    T_MIN = 350
    T_MAX = 480
    D_MIN = 0.1
    D_MAX = 0.9

\* Invariants to check
INVARIANT
    TypeOK
    PressureMatch
    AllInvariants

\* Model-check with small state space (representative samples)
\* Full verification done by Python property-based tests
